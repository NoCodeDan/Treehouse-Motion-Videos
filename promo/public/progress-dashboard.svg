<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="pdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="pdHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4290"/>
      <stop offset="100%" stop-color="#804197"/>
    </linearGradient>
    <linearGradient id="pdRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69c773"/>
      <stop offset="100%" stop-color="#28c840"/>
    </linearGradient>
    <filter id="pdGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#pdBg)"/>

  <!-- Dashboard header -->
  <rect x="20" y="15" width="760" height="50" rx="10" fill="url(#pdHeader)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
  </rect>
  <text x="50" y="45" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="16" fill="#fff" font-weight="600" opacity="0">
    Student Dashboard
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
  </text>
  <text x="750" y="45" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" opacity="0">
    Welcome, Dan
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- ============ LEFT: Progress Ring ============ -->
  <g transform="translate(140, 200)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.8s" fill="freeze"/>

    <!-- Background ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#333" stroke-width="12"/>

    <!-- Progress ring (72% = ~326 of ~503 circumference) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#pdRing)" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="503" stroke-dashoffset="503" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="503;141" dur="1.5s" begin="1.2s" fill="freeze"/>
    </circle>

    <!-- Percentage text (counts up) -->
    <text x="0" y="-5" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="36" fill="#fff" font-weight="700">
      <animate attributeName="textContent" values="0;72" dur="1.5s" begin="1.2s" fill="freeze"/>
    </text>
    <!-- Static percent and numbers showing (since textContent animate may not work in all browsers) -->
    <text x="0" y="-5" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="36" fill="#fff" font-weight="700" opacity="0">
      72
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
    </text>
    <text x="25" y="-5" font-family="-apple-system, sans-serif" font-size="16" fill="#69c773" opacity="0">
      %
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
    </text>

    <text x="0" y="20" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#888" opacity="0">
      Overall Progress
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.8s" fill="freeze"/>
    </text>
    <text x="0" y="38" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#666" opacity="0">
      18 of 25 courses
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.0s" fill="freeze"/>
    </text>
  </g>

  <!-- ============ CENTER: Streak Counter ============ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.5s" fill="freeze"/>
    <rect x="260" y="100" width="160" height="90" rx="12" fill="#2a2a3a" stroke="#444" stroke-width="1"/>

    <!-- Flame icon -->
    <g transform="translate(340, 125)" filter="url(#flameGlow)">
      <!-- Outer flame -->
      <path d="M0,-18 Q8,-8 6,0 Q4,6 0,8 Q-4,6 -6,0 Q-8,-8 0,-18Z" fill="#e17055">
        <animate attributeName="d" values="M0,-18 Q8,-8 6,0 Q4,6 0,8 Q-4,6 -6,0 Q-8,-8 0,-18Z;M0,-20 Q10,-9 7,0 Q5,7 0,9 Q-5,7 -7,0 Q-10,-9 0,-20Z;M0,-18 Q8,-8 6,0 Q4,6 0,8 Q-4,6 -6,0 Q-8,-8 0,-18Z" dur="1.5s" begin="2.0s" repeatCount="indefinite"/>
      </path>
      <!-- Inner flame -->
      <path d="M0,-8 Q4,-3 3,2 Q2,5 0,6 Q-2,5 -3,2 Q-4,-3 0,-8Z" fill="#febc2e">
        <animate attributeName="d" values="M0,-8 Q4,-3 3,2 Q2,5 0,6 Q-2,5 -3,2 Q-4,-3 0,-8Z;M0,-10 Q5,-4 4,2 Q3,6 0,7 Q-3,6 -4,2 Q-5,-4 0,-10Z;M0,-8 Q4,-3 3,2 Q2,5 0,6 Q-2,5 -3,2 Q-4,-3 0,-8Z" dur="1.5s" begin="2.0s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Streak number -->
    <text x="340" y="160" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="22" fill="#fff" font-weight="700" opacity="0">
      14 days
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </text>
    <text x="340" y="178" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#e17055" opacity="0">
      Learning Streak
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.3s" fill="freeze"/>
    </text>
  </g>

  <!-- ============ Topic Progress Bars ============ -->
  <g transform="translate(260, 220)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>

    <!-- Section label -->
    <text x="0" y="0" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" font-weight="600">Topic Progress</text>

    <!-- JavaScript -->
    <text x="0" y="28" font-family="-apple-system, sans-serif" font-size="10" fill="#888">JavaScript</text>
    <text x="270" y="28" text-anchor="end" font-family="-apple-system, sans-serif" font-size="10" fill="#3759a1" opacity="0">
      85%
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.2s" fill="freeze"/>
    </text>
    <rect x="0" y="34" width="270" height="6" rx="3" fill="#333"/>
    <rect x="0" y="34" width="0" height="6" rx="3" fill="#3759a1">
      <animate attributeName="width" values="0;230" dur="0.8s" begin="2.8s" fill="freeze"/>
    </rect>

    <!-- Python -->
    <text x="0" y="62" font-family="-apple-system, sans-serif" font-size="10" fill="#888">Python</text>
    <text x="270" y="62" text-anchor="end" font-family="-apple-system, sans-serif" font-size="10" fill="#238296" opacity="0">
      62%
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.5s" fill="freeze"/>
    </text>
    <rect x="0" y="68" width="270" height="6" rx="3" fill="#333"/>
    <rect x="0" y="68" width="0" height="6" rx="3" fill="#238296">
      <animate attributeName="width" values="0;167" dur="0.8s" begin="3.1s" fill="freeze"/>
    </rect>

    <!-- React -->
    <text x="0" y="96" font-family="-apple-system, sans-serif" font-size="10" fill="#888">React</text>
    <text x="270" y="96" text-anchor="end" font-family="-apple-system, sans-serif" font-size="10" fill="#3498db" opacity="0">
      45%
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.8s" fill="freeze"/>
    </text>
    <rect x="0" y="102" width="270" height="6" rx="3" fill="#333"/>
    <rect x="0" y="102" width="0" height="6" rx="3" fill="#3498db">
      <animate attributeName="width" values="0;122" dur="0.8s" begin="3.4s" fill="freeze"/>
    </rect>

    <!-- CSS -->
    <text x="0" y="130" font-family="-apple-system, sans-serif" font-size="10" fill="#888">CSS</text>
    <text x="270" y="130" text-anchor="end" font-family="-apple-system, sans-serif" font-size="10" fill="#3759a1" opacity="0">
      90%
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.1s" fill="freeze"/>
    </text>
    <rect x="0" y="136" width="270" height="6" rx="3" fill="#333"/>
    <rect x="0" y="136" width="0" height="6" rx="3" fill="#3759a1">
      <animate attributeName="width" values="0;243" dur="0.8s" begin="3.7s" fill="freeze"/>
    </rect>
  </g>

  <!-- ============ RIGHT: Earned Badges ============ -->
  <g transform="translate(580, 100)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.0s" fill="freeze"/>

    <text x="0" y="0" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="12" fill="#e0e0e0" font-weight="600">Earned Badges</text>

    <!-- Badge 1: JS Basics -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" values="0.5;1.1;1" dur="0.4s" begin="4.0s" fill="freeze" additive="sum"/>
      <polygon points="50,25 70,37 70,61 50,73 30,61 30,37" fill="#4a4290" stroke="#6c5ce7" stroke-width="1"/>
      <text x="50" y="54" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#fff">JS</text>
    </g>
    <text x="50" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#888" opacity="0">
      JS Basics
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.3s" fill="freeze"/>
    </text>

    <!-- Badge 2: Python -->
    <g opacity="0" transform="translate(70,0)">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.4s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" values="0.5;1.1;1" dur="0.4s" begin="4.4s" fill="freeze" additive="sum"/>
      <polygon points="50,25 70,37 70,61 50,73 30,61 30,37" fill="#238296" stroke="#2ca8ba" stroke-width="1"/>
      <text x="50" y="54" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#fff">Py</text>
    </g>
    <text x="120" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#888" opacity="0">
      Python
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.7s" fill="freeze"/>
    </text>

    <!-- Badge 3: CSS -->
    <g opacity="0" transform="translate(140,0)">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="scale" values="0.5;1.1;1" dur="0.4s" begin="4.8s" fill="freeze" additive="sum"/>
      <polygon points="50,25 70,37 70,61 50,73 30,61 30,37" fill="#3759a1" stroke="#4a70c2" stroke-width="1"/>
      <text x="50" y="54" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#fff">CSS</text>
    </g>
    <text x="190" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#888" opacity="0">
      CSS Master
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="5.1s" fill="freeze"/>
    </text>
  </g>

  <!-- ============ BOTTOM: Recent Activity ============ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.5s" fill="freeze"/>
    <rect x="580" y="210" width="190" height="160" rx="10" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="600" y="235" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#e0e0e0" font-weight="600">Recent Activity</text>

    <circle cx="608" cy="258" r="4" fill="#28c840"/>
    <text x="620" y="262" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Completed JS Arrays</text>

    <circle cx="608" cy="280" r="4" fill="#28c840"/>
    <text x="620" y="284" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Earned CSS Badge</text>

    <circle cx="608" cy="302" r="4" fill="#febc2e"/>
    <text x="620" y="306" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Started React Hooks</text>

    <circle cx="608" cy="324" r="4" fill="#febc2e"/>
    <text x="620" y="328" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Quiz: 8/10 Python</text>

    <circle cx="608" cy="346" r="4" fill="#3498db"/>
    <text x="620" y="350" font-family="-apple-system, sans-serif" font-size="9" fill="#888">New: AI Fundamentals</text>
  </g>

  <!-- Bottom stats -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.0s" fill="freeze"/>
    <rect x="20" y="420" width="180" height="60" rx="10" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="110" y="448" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="20" fill="#fff" font-weight="700">156</text>
    <text x="110" y="466" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Points This Week</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s" fill="freeze"/>
    <rect x="220" y="420" width="180" height="60" rx="10" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="310" y="448" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="20" fill="#fff" font-weight="700">42h</text>
    <text x="310" y="466" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Total Study Time</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.4s" fill="freeze"/>
    <rect x="420" y="420" width="180" height="60" rx="10" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="510" y="448" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="20" fill="#69c773" font-weight="700">#12</text>
    <text x="510" y="466" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#888">Leaderboard Rank</text>
  </g>
</svg>