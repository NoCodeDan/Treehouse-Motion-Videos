<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <linearGradient id="rdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="rdGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#rdBg)"/>

  <!-- CSS media query code snippet at top -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.5s" fill="freeze"/>
    <rect x="170" y="10" width="360" height="48" rx="6" fill="#2a2a3a" stroke="#3759a1" stroke-width="1"/>
    <text x="190" y="30" font-family="SF Mono, Menlo, monospace" font-size="10">
      <tspan fill="#d44c66">@media</tspan>
      <tspan fill="#e0e0e0"> (</tspan>
      <tspan fill="#69c773">max-width</tspan>
      <tspan fill="#e0e0e0">: </tspan>
      <tspan fill="#febc2e">768px</tspan>
      <tspan fill="#e0e0e0">) {</tspan>
    </text>
    <text x="200" y="46" font-family="SF Mono, Menlo, monospace" font-size="10">
      <tspan fill="#e0e0e0">.grid { </tspan>
      <tspan fill="#69c773">flex-direction</tspan>
      <tspan fill="#e0e0e0">: </tspan>
      <tspan fill="#febc2e">column</tspan>
      <tspan fill="#e0e0e0">; }</tspan>
    </text>
  </g>

  <!-- === Desktop frame === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>

    <!-- Monitor body -->
    <rect x="30" y="75" width="260" height="175" rx="8" fill="#333" stroke="#555" stroke-width="1"/>
    <!-- Screen -->
    <rect x="38" y="83" width="244" height="152" rx="2" fill="#1a1a2e"/>
    <!-- Monitor stand -->
    <rect x="140" y="250" width="40" height="20" fill="#444"/>
    <rect x="115" y="268" width="90" height="6" rx="3" fill="#555"/>

    <!-- Desktop layout: nav + 3 columns -->
    <rect x="42" y="87" width="236" height="18" rx="2" fill="#3759a1" opacity="0.4"/>
    <rect x="42" y="110" width="75" height="60" rx="3" fill="#4a4190" opacity="0.3"/>
    <rect x="121" y="110" width="75" height="60" rx="3" fill="#804197" opacity="0.3"/>
    <rect x="200" y="110" width="75" height="60" rx="3" fill="#d44c66" opacity="0.3"/>
    <rect x="42" y="176" width="236" height="8" rx="2" fill="#333"/>
    <rect x="42" y="190" width="180" height="6" rx="2" fill="#2a2a3a"/>
    <rect x="42" y="200" width="140" height="6" rx="2" fill="#2a2a3a"/>
    <rect x="42" y="218" width="236" height="12" rx="2" fill="#333"/>

    <!-- Desktop label -->
    <text x="160" y="298" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#888">Desktop (1200px)</text>
  </g>

  <!-- === Tablet frame === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>

    <!-- Tablet body -->
    <rect x="330" y="90" width="150" height="200" rx="12" fill="#333" stroke="#555" stroke-width="1"/>
    <!-- Screen -->
    <rect x="338" y="102" width="134" height="172" rx="2" fill="#1a1a2e"/>
    <!-- Home indicator -->
    <rect x="385" y="280" width="30" height="3" rx="1.5" fill="#555"/>

    <!-- Tablet layout: nav + 2 columns -->
    <rect x="342" y="106" width="126" height="14" rx="2" fill="#3759a1" opacity="0.4"/>
    <rect x="342" y="124" width="61" height="50" rx="3" fill="#4a4190" opacity="0.3"/>
    <rect x="407" y="124" width="61" height="50" rx="3" fill="#804197" opacity="0.3"/>
    <rect x="342" y="178" width="126" height="50" rx="3" fill="#d44c66" opacity="0.3"/>
    <rect x="342" y="234" width="126" height="6" rx="2" fill="#333"/>
    <rect x="342" y="244" width="100" height="5" rx="2" fill="#2a2a3a"/>
    <rect x="342" y="254" width="126" height="10" rx="2" fill="#333"/>

    <!-- Tablet label -->
    <text x="405" y="310" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#888">Tablet (768px)</text>
  </g>

  <!-- === Phone frame === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.5s" fill="freeze"/>

    <!-- Phone body -->
    <rect x="540" y="105" width="100" height="185" rx="14" fill="#333" stroke="#555" stroke-width="1"/>
    <!-- Notch -->
    <rect x="570" y="105" width="40" height="10" rx="5" fill="#333"/>
    <!-- Screen -->
    <rect x="548" y="118" width="84" height="155" rx="2" fill="#1a1a2e"/>
    <!-- Home indicator -->
    <rect x="573" y="280" width="24" height="3" rx="1.5" fill="#555"/>

    <!-- Phone layout: stacked -->
    <rect x="552" y="122" width="76" height="12" rx="2" fill="#3759a1" opacity="0.4"/>
    <rect x="552" y="138" width="76" height="35" rx="3" fill="#4a4190" opacity="0.3"/>
    <rect x="552" y="177" width="76" height="35" rx="3" fill="#804197" opacity="0.3"/>
    <rect x="552" y="216" width="76" height="35" rx="3" fill="#d44c66" opacity="0.3"/>
    <rect x="552" y="256" width="76" height="8" rx="2" fill="#333"/>

    <!-- Phone label -->
    <text x="590" y="310" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#888">Mobile (375px)</text>
  </g>

  <!-- Dashed arrows from code to tablet and phone -->
  <line x1="350" y1="58" x2="405" y2="88" stroke="#3759a1" stroke-width="1" stroke-dasharray="4,3" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="4.0s" fill="freeze"/>
  </line>
  <line x1="350" y1="58" x2="590" y2="103" stroke="#3759a1" stroke-width="1" stroke-dasharray="4,3" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="4.2s" fill="freeze"/>
  </line>

  <!-- Arrow heads -->
  <polygon points="403,85 408,92 398,92" fill="#3759a1" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="4.0s" fill="freeze"/>
  </polygon>
  <polygon points="588,100 593,107 583,107" fill="#3759a1" opacity="0">
    <animate attributeName="opacity" values="0;0.6" dur="0.3s" begin="4.2s" fill="freeze"/>
  </polygon>

  <!-- Bottom label -->
  <text x="350" y="350" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#3759a1" opacity="0" filter="url(#rdGlow)">
    Responsive Design
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.5s" fill="freeze"/>
  </text>
  <text x="350" y="370" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#666" opacity="0">
    Same content, optimized for every screen
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.8s" fill="freeze"/>
  </text>
</svg>