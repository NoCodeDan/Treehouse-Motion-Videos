<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" width="650" height="400">
  <defs>
    <linearGradient id="dbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="dbGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="650" height="400" fill="url(#dbBg)"/>

  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#666" opacity="0">
    Database Schema — Relationships
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- === Users table (top-left) === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <!-- Table card -->
    <rect x="40" y="55" width="180" height="155" rx="8" fill="#2a2a3a" stroke="#6c5ce7" stroke-width="1.5"/>
    <!-- Header -->
    <rect x="40" y="55" width="180" height="30" rx="8" fill="#6c5ce7"/>
    <rect x="40" y="75" width="180" height="10" fill="#6c5ce7"/>
    <text x="130" y="74" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#fff" font-weight="bold">users</text>

    <!-- Rows (reveal top-to-bottom) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.0s" fill="freeze"/>
      <text x="55" y="103" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#febc2e">PK</tspan>
        <tspan fill="#e0e0e0"> id</tspan>
        <tspan fill="#666"> INT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.2s" fill="freeze"/>
      <text x="55" y="120" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   name</tspan>
        <tspan fill="#666"> VARCHAR</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.4s" fill="freeze"/>
      <text x="55" y="137" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   email</tspan>
        <tspan fill="#666"> VARCHAR</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.6s" fill="freeze"/>
      <text x="55" y="154" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   created_at</tspan>
        <tspan fill="#666"> DATE</tspan>
      </text>
    </g>
    <line x1="50" y1="162" x2="210" y2="162" stroke="#444" stroke-width="0.5"/>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.8s" fill="freeze"/>
      <text x="55" y="178" font-family="SF Mono, Menlo, monospace" font-size="8" fill="#888">INDEX: email (unique)</text>
    </g>
  </g>

  <!-- === Posts table (top-right) === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
    <rect x="410" y="55" width="200" height="175" rx="8" fill="#2a2a3a" stroke="#238296" stroke-width="1.5"/>
    <rect x="410" y="55" width="200" height="30" rx="8" fill="#238296"/>
    <rect x="410" y="75" width="200" height="10" fill="#238296"/>
    <text x="510" y="74" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#fff" font-weight="bold">posts</text>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.8s" fill="freeze"/>
      <text x="425" y="103" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#febc2e">PK</tspan>
        <tspan fill="#e0e0e0"> id</tspan>
        <tspan fill="#666"> INT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.0s" fill="freeze"/>
      <text x="425" y="120" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#d44c66">FK</tspan>
        <tspan fill="#e0e0e0"> user_id</tspan>
        <tspan fill="#666"> INT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.2s" fill="freeze"/>
      <text x="425" y="137" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   title</tspan>
        <tspan fill="#666"> VARCHAR</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.4s" fill="freeze"/>
      <text x="425" y="154" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   body</tspan>
        <tspan fill="#666"> TEXT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
      <text x="425" y="171" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   published</tspan>
        <tspan fill="#666"> BOOL</tspan>
      </text>
    </g>
    <line x1="420" y1="180" x2="600" y2="180" stroke="#444" stroke-width="0.5"/>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.8s" fill="freeze"/>
      <text x="425" y="198" font-family="SF Mono, Menlo, monospace" font-size="8" fill="#888">FK: user_id -> users.id</text>
    </g>
  </g>

  <!-- === Comments table (bottom-center) === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.0s" fill="freeze"/>
    <rect x="215" y="265" width="220" height="125" rx="8" fill="#2a2a3a" stroke="#d63031" stroke-width="1.5"/>
    <rect x="215" y="265" width="220" height="30" rx="8" fill="#d63031"/>
    <rect x="215" y="285" width="220" height="10" fill="#d63031"/>
    <text x="325" y="284" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#fff" font-weight="bold">comments</text>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.8s" fill="freeze"/>
      <text x="230" y="313" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#febc2e">PK</tspan>
        <tspan fill="#e0e0e0"> id</tspan>
        <tspan fill="#666"> INT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.0s" fill="freeze"/>
      <text x="230" y="330" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#d44c66">FK</tspan>
        <tspan fill="#e0e0e0"> post_id</tspan>
        <tspan fill="#666"> INT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.2s" fill="freeze"/>
      <text x="230" y="347" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#d44c66">FK</tspan>
        <tspan fill="#e0e0e0"> user_id</tspan>
        <tspan fill="#666"> INT</tspan>
      </text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.4s" fill="freeze"/>
      <text x="230" y="364" font-family="SF Mono, Menlo, monospace" font-size="9">
        <tspan fill="#e0e0e0">   content</tspan>
        <tspan fill="#666"> TEXT</tspan>
      </text>
    </g>
  </g>

  <!-- === Relationship lines === -->
  <!-- users.id -> posts.user_id -->
  <line x1="220" y1="115" x2="410" y2="115" stroke="#d44c66" stroke-width="1.5" stroke-dasharray="190" stroke-dashoffset="190">
    <animate attributeName="stroke-dashoffset" values="190;0" dur="0.6s" begin="3.8s" fill="freeze"/>
  </line>
  <!-- 1:N indicator -->
  <text x="230" y="108" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#d44c66" opacity="0">
    1
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.4s" fill="freeze"/>
  </text>
  <text x="400" y="108" text-anchor="end" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#d44c66" opacity="0">
    N
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.4s" fill="freeze"/>
  </text>

  <!-- posts.id -> comments.post_id -->
  <line x1="510" y1="230" x2="435" y2="325" stroke="#d44c66" stroke-width="1.5" stroke-dasharray="120" stroke-dashoffset="120">
    <animate attributeName="stroke-dashoffset" values="120;0" dur="0.6s" begin="4.0s" fill="freeze"/>
  </line>
  <text x="490" y="248" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#d44c66" opacity="0">
    1
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.6s" fill="freeze"/>
  </text>
  <text x="440" y="318" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#d44c66" opacity="0">
    N
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.6s" fill="freeze"/>
  </text>

  <!-- users.id -> comments.user_id -->
  <line x1="130" y1="210" x2="215" y2="340" stroke="#d44c66" stroke-width="1.5" stroke-dasharray="160" stroke-dashoffset="160">
    <animate attributeName="stroke-dashoffset" values="160;0" dur="0.6s" begin="4.2s" fill="freeze"/>
  </line>
  <text x="135" y="222" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#d44c66" opacity="0">
    1
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.8s" fill="freeze"/>
  </text>
  <text x="210" y="348" text-anchor="end" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#d44c66" opacity="0">
    N
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.8s" fill="freeze"/>
  </text>

  <!-- FK highlight pulse on user_id fields -->
  <rect x="423" y="111" width="80" height="13" rx="2" fill="#d44c66" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0" dur="1s" begin="4.4s" fill="freeze"/>
  </rect>
  <rect x="228" y="321" width="80" height="13" rx="2" fill="#d44c66" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0" dur="1s" begin="4.6s" fill="freeze"/>
  </rect>
  <rect x="228" y="338" width="80" height="13" rx="2" fill="#d44c66" opacity="0">
    <animate attributeName="opacity" values="0;0.2;0" dur="1s" begin="4.8s" fill="freeze"/>
  </rect>
</svg>