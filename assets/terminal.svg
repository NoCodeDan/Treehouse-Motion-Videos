<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="termTitleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c3c3c"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="10" y="10" width="580" height="380" rx="10"/>
    </clipPath>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#termClip)">
    <!-- Window frame -->
    <rect x="10" y="10" width="580" height="380" rx="10" fill="url(#termBg)" stroke="#444" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="10" y="10" width="580" height="36" fill="url(#termTitleBar)"/>
    <line x1="10" y1="46" x2="590" y2="46" stroke="#222" stroke-width="1"/>

    <!-- Traffic lights -->
    <circle cx="32" cy="28" r="6.5" fill="#ff5f57"/>
    <circle cx="52" cy="28" r="6.5" fill="#febc2e"/>
    <circle cx="72" cy="28" r="6.5" fill="#28c840"/>

    <!-- Title text -->
    <text x="300" y="32" text-anchor="middle" fill="#999" font-family="SF Mono, Menlo, Monaco, monospace" font-size="12">bash — 80x24</text>

    <!-- Terminal content area -->
    <rect x="10" y="46" width="580" height="344" fill="#1a1a1a"/>

    <!-- Line 1: prompt + command -->
    <text y="72" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" filter="url(#termGlow)">
      <tspan x="24" fill="#28c840">~</tspan>
      <tspan fill="#666"> $ </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.3s" fill="freeze"/>
        n
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.38s" fill="freeze"/>
        p
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.46s" fill="freeze"/>
        x
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.54s" fill="freeze"/>

      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.62s" fill="freeze"/>
        c
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.7s" fill="freeze"/>
        r
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.78s" fill="freeze"/>
        e
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.86s" fill="freeze"/>
        a
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="0.94s" fill="freeze"/>
        t
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.02s" fill="freeze"/>
        e
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.1s" fill="freeze"/>

      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.18s" fill="freeze"/>
        v
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.26s" fill="freeze"/>
        i
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.34s" fill="freeze"/>
        d
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.42s" fill="freeze"/>
        e
      </tspan>
      <tspan fill="#e0e0e0">
        <animate attributeName="visibility" values="hidden;visible" dur="0.1s" begin="1.50s" fill="freeze"/>
        o
      </tspan>
    </text>

    <!-- Line 2: output (appears after typing) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.0s" fill="freeze"/>
      <text y="96" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">
        <tspan x="24" fill="#888">Creating a new video project...</tspan>
      </text>
    </g>

    <!-- Line 3: success output -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
      <text y="120" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">
        <tspan x="24" fill="#28c840">&#x2714;</tspan>
        <tspan fill="#e0e0e0"> Dependencies installed</tspan>
      </text>
    </g>

    <!-- Line 4: success output -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.0s" fill="freeze"/>
      <text y="144" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">
        <tspan x="24" fill="#28c840">&#x2714;</tspan>
        <tspan fill="#e0e0e0"> Project structure created</tspan>
      </text>
    </g>

    <!-- Line 5: success output -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.4s" fill="freeze"/>
      <text y="168" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">
        <tspan x="24" fill="#28c840">&#x2714;</tspan>
        <tspan fill="#e0e0e0"> Config files generated</tspan>
      </text>
    </g>

    <!-- Line 6: ready message -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.8s" fill="freeze"/>
      <text y="204" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">
        <tspan x="24" fill="#febc2e">Ready!</tspan>
        <tspan fill="#888"> Run </tspan>
        <tspan fill="#d44c66">npm start</tspan>
        <tspan fill="#888"> to begin</tspan>
      </text>
    </g>

    <!-- Line 7: new prompt -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.4s" fill="freeze"/>
      <text y="240" font-family="SF Mono, Menlo, Monaco, monospace" font-size="13">
        <tspan x="24" fill="#28c840">~</tspan>
        <tspan fill="#666"> $ </tspan>
      </text>
      <!-- Blinking cursor -->
      <rect x="56" y="228" width="8" height="16" fill="#28c840">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
