<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <filter id="loopGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#666" opacity="0">
    Loop Visualizer
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- for loop code -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.4s" fill="freeze"/>
    <text y="68" font-family="SF Mono, Menlo, monospace" font-size="13" filter="url(#loopGlow)">
      <tspan x="30" fill="#d44c66">for</tspan>
      <tspan fill="#e0e0e0"> (</tspan>
      <tspan fill="#804197">let</tspan>
      <tspan fill="#e0e0e0"> i = </tspan>
      <tspan fill="#febc2e">0</tspan>
      <tspan fill="#e0e0e0">; i &lt; </tspan>
      <tspan fill="#febc2e">5</tspan>
      <tspan fill="#e0e0e0">; i++) {</tspan>
    </text>
    <text x="50" y="88" font-family="SF Mono, Menlo, monospace" font-size="13" filter="url(#loopGlow)">
      <tspan fill="#69c773">process</tspan>
      <tspan fill="#e0e0e0">(arr[i]);</tspan>
    </text>
    <text x="30" y="108" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#e0e0e0">}</text>
  </g>

  <!-- Array boxes -->
  <g transform="translate(50, 150)">
    <!-- Box 0 -->
    <rect x="0" y="0" width="70" height="50" rx="6" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="35" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#888">12</text>
    <text x="35" y="70" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#555">[0]</text>
    <!-- Highlight -->
    <rect x="0" y="0" width="70" height="50" rx="6" fill="#3759a1" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="1.0s" fill="freeze"/>
    </rect>
    <text x="35" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#fff" opacity="0">
      12
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
    </text>

    <!-- Box 1 -->
    <rect x="85" y="0" width="70" height="50" rx="6" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="120" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#888">7</text>
    <text x="120" y="70" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#555">[1]</text>
    <rect x="85" y="0" width="70" height="50" rx="6" fill="#238296" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="1.8s" fill="freeze"/>
    </rect>
    <text x="120" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#fff" opacity="0">
      7
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </text>

    <!-- Box 2 -->
    <rect x="170" y="0" width="70" height="50" rx="6" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="205" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#888">23</text>
    <text x="205" y="70" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#555">[2]</text>
    <rect x="170" y="0" width="70" height="50" rx="6" fill="#733a87" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="2.6s" fill="freeze"/>
    </rect>
    <text x="205" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#fff" opacity="0">
      23
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.6s" fill="freeze"/>
    </text>

    <!-- Box 3 -->
    <rect x="255" y="0" width="70" height="50" rx="6" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="290" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#888">4</text>
    <text x="290" y="70" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#555">[3]</text>
    <rect x="255" y="0" width="70" height="50" rx="6" fill="#e17055" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="3.4s" fill="freeze"/>
    </rect>
    <text x="290" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#fff" opacity="0">
      4
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.4s" fill="freeze"/>
    </text>

    <!-- Box 4 -->
    <rect x="340" y="0" width="70" height="50" rx="6" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="375" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#888">18</text>
    <text x="375" y="70" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#555">[4]</text>
    <rect x="340" y="0" width="70" height="50" rx="6" fill="#69c773" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="4.2s" fill="freeze"/>
    </rect>
    <text x="375" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#fff" opacity="0">
      18
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.2s" fill="freeze"/>
    </text>
  </g>

  <!-- Pointer arrow -->
  <polygon points="85,140 75,128 95,128" fill="#febc2e" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.9s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;85,0;170,0;255,0;340,0" dur="3.5s" begin="0.9s" fill="freeze" keyTimes="0;0.23;0.46;0.69;1"/>
  </polygon>

  <!-- Counter display -->
  <g transform="translate(30, 270)">
    <rect width="440" height="55" rx="8" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <text x="20" y="22" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#666">Iteration:</text>

    <!-- i = 0 -->
    <text x="110" y="22" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#febc2e" opacity="0">
      i = 0
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.0s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="1.8s" fill="freeze"/>
    </text>
    <!-- i = 1 -->
    <text x="110" y="22" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#febc2e" opacity="0">
      i = 1
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="2.6s" fill="freeze"/>
    </text>
    <!-- i = 2 -->
    <text x="110" y="22" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#febc2e" opacity="0">
      i = 2
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="3.4s" fill="freeze"/>
    </text>
    <!-- i = 3 -->
    <text x="110" y="22" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#febc2e" opacity="0">
      i = 3
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.4s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="4.2s" fill="freeze"/>
    </text>
    <!-- i = 4 -->
    <text x="110" y="22" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#febc2e" opacity="0">
      i = 4
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.2s" fill="freeze"/>
    </text>

    <!-- Processing value -->
    <text x="20" y="42" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#666">Value:</text>
    <text x="110" y="42" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#69c773" opacity="0">
      12
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.0s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="110" y="42" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#69c773" opacity="0">
      7
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="2.6s" fill="freeze"/>
    </text>
    <text x="110" y="42" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#69c773" opacity="0">
      23
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.6s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="3.4s" fill="freeze"/>
    </text>
    <text x="110" y="42" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#69c773" opacity="0">
      4
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.4s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="4.2s" fill="freeze"/>
    </text>
    <text x="110" y="42" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#69c773" opacity="0">
      18
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.2s" fill="freeze"/>
    </text>

    <!-- Done indicator -->
    <text x="250" y="32" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#28c840" opacity="0">
      &#x2714; Loop complete!
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.8s" fill="freeze"/>
    </text>
  </g>
</svg>