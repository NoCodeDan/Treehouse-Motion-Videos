<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="dpBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="dpGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dpPulse">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="url(#dpBg)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#666" opacity="0">
    CI/CD Deployment Pipeline
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Pipeline connector line -->
  <line x1="100" y1="130" x2="700" y2="130" stroke="#333" stroke-width="2" stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" values="600;0" dur="1.5s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- === Stage 1: Build === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <!-- Stage box -->
    <rect x="55" y="80" width="100" height="100" rx="10" fill="#2a2a3a" stroke="#636e72" stroke-width="1.5"/>
    <!-- Icon: hammer -->
    <rect x="90" y="98" width="20" height="4" rx="1" fill="#636e72"/>
    <rect x="95" y="94" width="4" height="12" rx="1" fill="#636e72"/>
    <!-- Label -->
    <text x="105" y="132" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#e0e0e0">Build</text>

    <!-- Status: pending -> running -> passed -->
    <!-- Pending (gray dot) -->
    <circle cx="105" cy="155" r="8" fill="#636e72">
      <animate attributeName="fill" values="#636e72;#febc2e" dur="0.3s" begin="1.5s" fill="freeze"/>
      <animate attributeName="fill" values="#febc2e;#28c840" dur="0.3s" begin="2.5s" fill="freeze"/>
    </circle>
    <!-- Running pulse -->
    <circle cx="105" cy="155" r="8" fill="#febc2e" opacity="0" filter="url(#dpPulse)">
      <animate attributeName="opacity" values="0;0.5;0;0.5;0" dur="1.0s" begin="1.5s" fill="freeze"/>
    </circle>
    <!-- Checkmark (appears when passed) -->
    <path d="M99,155 L103,159 L112,150" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="2.5s" fill="freeze"/>
    </path>
  </g>

  <!-- === Stage 2: Test === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.1s" fill="freeze"/>
    <rect x="205" y="80" width="100" height="100" rx="10" fill="#2a2a3a" stroke="#636e72" stroke-width="1.5"/>
    <!-- Icon: test tube / checkmark -->
    <rect x="243" y="94" width="14" height="18" rx="3" fill="none" stroke="#636e72" stroke-width="1.5"/>
    <line x1="243" y1="100" x2="257" y2="100" stroke="#636e72" stroke-width="1"/>
    <text x="255" y="132" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#e0e0e0">Test</text>

    <circle cx="255" cy="155" r="8" fill="#636e72">
      <animate attributeName="fill" values="#636e72;#febc2e" dur="0.3s" begin="2.8s" fill="freeze"/>
      <animate attributeName="fill" values="#febc2e;#28c840" dur="0.3s" begin="4.0s" fill="freeze"/>
    </circle>
    <circle cx="255" cy="155" r="8" fill="#febc2e" opacity="0" filter="url(#dpPulse)">
      <animate attributeName="opacity" values="0;0.5;0;0.5;0" dur="1.2s" begin="2.8s" fill="freeze"/>
    </circle>
    <path d="M249,155 L253,159 L262,150" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.0s" fill="freeze"/>
    </path>
  </g>

  <!-- === Stage 3: Lint === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <rect x="355" y="80" width="100" height="100" rx="10" fill="#2a2a3a" stroke="#636e72" stroke-width="1.5"/>
    <!-- Icon: code brackets -->
    <text x="405" y="112" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#636e72">&lt;/&gt;</text>
    <text x="405" y="132" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#e0e0e0">Lint</text>

    <circle cx="405" cy="155" r="8" fill="#636e72">
      <animate attributeName="fill" values="#636e72;#febc2e" dur="0.3s" begin="4.3s" fill="freeze"/>
      <animate attributeName="fill" values="#febc2e;#28c840" dur="0.3s" begin="5.2s" fill="freeze"/>
    </circle>
    <circle cx="405" cy="155" r="8" fill="#febc2e" opacity="0" filter="url(#dpPulse)">
      <animate attributeName="opacity" values="0;0.5;0;0.5;0" dur="0.9s" begin="4.3s" fill="freeze"/>
    </circle>
    <path d="M399,155 L403,159 L412,150" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="5.2s" fill="freeze"/>
    </path>
  </g>

  <!-- === Stage 4: Stage === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.7s" fill="freeze"/>
    <rect x="505" y="80" width="100" height="100" rx="10" fill="#2a2a3a" stroke="#636e72" stroke-width="1.5"/>
    <!-- Icon: server -->
    <rect x="530" y="94" width="50" height="10" rx="2" fill="none" stroke="#636e72" stroke-width="1"/>
    <circle cx="572" cy="99" r="2" fill="#636e72"/>
    <rect x="530" y="107" width="50" height="10" rx="2" fill="none" stroke="#636e72" stroke-width="1"/>
    <circle cx="572" cy="112" r="2" fill="#636e72"/>
    <text x="555" y="132" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#e0e0e0">Stage</text>

    <circle cx="555" cy="155" r="8" fill="#636e72">
      <animate attributeName="fill" values="#636e72;#febc2e" dur="0.3s" begin="5.5s" fill="freeze"/>
      <animate attributeName="fill" values="#febc2e;#28c840" dur="0.3s" begin="6.5s" fill="freeze"/>
    </circle>
    <circle cx="555" cy="155" r="8" fill="#febc2e" opacity="0" filter="url(#dpPulse)">
      <animate attributeName="opacity" values="0;0.5;0;0.5;0" dur="1.0s" begin="5.5s" fill="freeze"/>
    </circle>
    <path d="M549,155 L553,159 L562,150" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="6.5s" fill="freeze"/>
    </path>
  </g>

  <!-- === Stage 5: Deploy === -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.0s" fill="freeze"/>
    <rect x="655" y="80" width="100" height="100" rx="10" fill="#2a2a3a" stroke="#636e72" stroke-width="1.5"/>
    <!-- Icon: rocket -->
    <text x="705" y="112" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="18" fill="#636e72">&#x2191;</text>
    <text x="705" y="132" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#e0e0e0">Deploy</text>

    <circle cx="705" cy="155" r="8" fill="#636e72">
      <animate attributeName="fill" values="#636e72;#febc2e" dur="0.3s" begin="6.8s" fill="freeze"/>
      <animate attributeName="fill" values="#febc2e;#28c840" dur="0.3s" begin="7.8s" fill="freeze"/>
    </circle>
    <circle cx="705" cy="155" r="8" fill="#febc2e" opacity="0" filter="url(#dpPulse)">
      <animate attributeName="opacity" values="0;0.5;0;0.5;0" dur="1.0s" begin="6.8s" fill="freeze"/>
    </circle>
    <path d="M699,155 L703,159 L712,150" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" begin="7.8s" fill="freeze"/>
    </path>

    <!-- Final deploy glow -->
    <rect x="655" y="80" width="100" height="100" rx="10" fill="#28c840" opacity="0">
      <animate attributeName="opacity" values="0;0.15;0.05" dur="0.8s" begin="7.8s" fill="freeze"/>
    </rect>
  </g>

  <!-- === Progress bar along bottom === -->
  <rect x="55" y="210" width="700" height="6" rx="3" fill="#333"/>
  <!-- Fill segments -->
  <rect x="55" y="210" width="0" height="6" rx="3" fill="#28c840">
    <animate attributeName="width" values="0;140" dur="1.0s" begin="2.5s" fill="freeze"/>
    <animate attributeName="width" values="140;280" dur="1.0s" begin="4.0s" fill="freeze"/>
    <animate attributeName="width" values="280;420" dur="0.8s" begin="5.2s" fill="freeze"/>
    <animate attributeName="width" values="420;560" dur="1.0s" begin="6.5s" fill="freeze"/>
    <animate attributeName="width" values="560;700" dur="1.0s" begin="7.8s" fill="freeze"/>
  </rect>

  <!-- Pipeline info -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
    <text x="55" y="240" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#888">
      <tspan fill="#666">Pipeline:</tspan>
      <tspan fill="#e0e0e0"> #1247</tspan>
      <tspan fill="#666"> · Branch:</tspan>
      <tspan fill="#4a4190"> main</tspan>
      <tspan fill="#666"> · Triggered by:</tspan>
      <tspan fill="#e0e0e0"> push</tspan>
    </text>
  </g>

  <!-- Commit info -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
    <text x="55" y="260" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#888">
      <tspan fill="#666">Commit:</tspan>
      <tspan fill="#febc2e"> a3f2b1c</tspan>
      <tspan fill="#666"> — "Add user authentication"</tspan>
    </text>
  </g>

  <!-- Final success message -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="8.2s" fill="freeze"/>
    <rect x="225" y="280" width="350" height="40" rx="8" fill="#2a2a3a" stroke="#28c840" stroke-width="1.5"/>
    <text x="400" y="305" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" filter="url(#dpGlow)">
      <tspan fill="#28c840">&#x2714; Deployed to production</tspan>
      <tspan fill="#888"> · 2m 34s</tspan>
    </text>
  </g>
</svg>