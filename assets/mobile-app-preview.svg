<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="maBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="maHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4290"/>
      <stop offset="100%" stop-color="#804197"/>
    </linearGradient>
    <linearGradient id="maProgress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#69c773"/>
      <stop offset="100%" stop-color="#28c840"/>
    </linearGradient>
    <clipPath id="maScreenClip">
      <rect x="60" y="50" width="280" height="600" rx="2"/>
    </clipPath>
    <filter id="maGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="700" fill="url(#maBg)"/>

  <!-- iPhone frame -->
  <rect x="50" y="30" width="300" height="640" rx="36" fill="#222" stroke="#555" stroke-width="1.5"/>
  <!-- Dynamic Island -->
  <rect x="155" y="38" width="90" height="22" rx="11" fill="#111"/>
  <!-- Screen area -->
  <rect x="60" y="50" width="280" height="600" rx="2" fill="#1a1a2e"/>

  <g clip-path="url(#maScreenClip)">

    <!-- === Status bar === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
      <text x="78" y="75" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="600">9:41</text>
      <rect x="292" y="66" width="22" height="10" rx="2" fill="none" stroke="#fff" stroke-width="1"/>
      <rect x="294" y="68" width="16" height="6" rx="1" fill="#69c773"/>
      <rect x="314" y="69" width="1.5" height="4" rx="0.5" fill="#fff"/>
    </g>

    <!-- === Header === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
      <rect x="60" y="82" width="280" height="70" fill="url(#maHeader)"/>
      <!-- Avatar circle -->
      <circle cx="85" cy="102" r="16" fill="#69c773" opacity="0.3"/>
      <text x="85" y="107" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#fff">D</text>
      <!-- Greeting -->
      <text x="110" y="100" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Welcome back</text>
      <text x="110" y="115" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="13" fill="#fff" font-weight="600">Dan</text>
      <!-- Streak badge -->
      <rect x="280" y="93" width="45" height="22" rx="11" fill="rgba(255,255,255,0.15)"/>
      <text x="303" y="108" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#febc2e">7d</text>

      <!-- Overall progress bar -->
      <rect x="75" y="132" width="250" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
      <rect x="75" y="132" width="0" height="6" rx="3" fill="url(#maProgress)">
        <animate attributeName="width" values="0;165" dur="1s" begin="1.0s" fill="freeze"/>
      </rect>
      <text x="75" y="148" font-family="-apple-system, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)">66% complete</text>
    </g>

    <!-- === Topic pills (slide in from right) === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="80,0;0,0" dur="0.4s" begin="1.5s" fill="freeze"/>
        <rect x="70" y="162" width="70" height="26" rx="13" fill="#3759a1"/>
        <text x="105" y="179" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#fff">JavaScript</text>

        <rect x="148" y="162" width="56" height="26" rx="13" fill="#238296"/>
        <text x="176" y="179" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#fff">Python</text>

        <rect x="212" y="162" width="46" height="26" rx="13" fill="#3498db"/>
        <text x="235" y="179" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#fff">React</text>

        <rect x="266" y="162" width="36" height="26" rx="13" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
        <text x="284" y="179" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#888">All</text>
      </g>
    </g>

    <!-- === Course card 1 === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.0s" fill="freeze"/>
      <rect x="70" y="200" width="260" height="110" rx="12" fill="#2a2a3a" stroke="#444" stroke-width="0.5"/>
      <!-- Topic color accent -->
      <rect x="70" y="200" width="4" height="110" rx="2" fill="#3759a1"/>
      <!-- Course icon placeholder -->
      <rect x="86" y="215" width="40" height="40" rx="8" fill="#3759a1" opacity="0.2"/>
      <text x="106" y="240" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#3759a1">JS</text>
      <!-- Course info -->
      <text x="138" y="230" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="600">JavaScript Basics</text>
      <text x="138" y="246" font-family="-apple-system, sans-serif" font-size="9" fill="#888">12 lessons · 3h 20m</text>
      <!-- Progress bar -->
      <rect x="86" y="270" width="230" height="5" rx="2.5" fill="#333"/>
      <rect x="86" y="270" width="0" height="5" rx="2.5" fill="#69c773">
        <animate attributeName="width" values="0;160" dur="0.8s" begin="2.5s" fill="freeze"/>
      </rect>
      <text x="86" y="290" font-family="-apple-system, sans-serif" font-size="8" fill="#69c773" opacity="0">
        70% complete
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.3s" fill="freeze"/>
      </text>
      <text x="316" y="290" text-anchor="end" font-family="-apple-system, sans-serif" font-size="8" fill="#888" opacity="0">
        Continue
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.3s" fill="freeze"/>
      </text>
    </g>

    <!-- === Course card 2 === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
      <rect x="70" y="325" width="260" height="110" rx="12" fill="#2a2a3a" stroke="#444" stroke-width="0.5"/>
      <rect x="70" y="325" width="4" height="110" rx="2" fill="#238296"/>
      <rect x="86" y="340" width="40" height="40" rx="8" fill="#238296" opacity="0.2"/>
      <text x="106" y="365" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#238296">Py</text>
      <text x="138" y="355" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="600">Python for Beginners</text>
      <text x="138" y="371" font-family="-apple-system, sans-serif" font-size="9" fill="#888">8 lessons · 2h 10m</text>
      <rect x="86" y="395" width="230" height="5" rx="2.5" fill="#333"/>
      <rect x="86" y="395" width="0" height="5" rx="2.5" fill="#69c773">
        <animate attributeName="width" values="0;55" dur="0.6s" begin="3.4s" fill="freeze"/>
      </rect>
      <text x="86" y="415" font-family="-apple-system, sans-serif" font-size="8" fill="#69c773" opacity="0">
        24% complete
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.0s" fill="freeze"/>
      </text>
    </g>

    <!-- === Course card 3 === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.5s" fill="freeze"/>
      <rect x="70" y="450" width="260" height="110" rx="12" fill="#2a2a3a" stroke="#444" stroke-width="0.5"/>
      <rect x="70" y="450" width="4" height="110" rx="2" fill="#4a4190"/>
      <rect x="86" y="465" width="40" height="40" rx="8" fill="#4a4190" opacity="0.2"/>
      <text x="106" y="490" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#4a4190">AI</text>
      <text x="138" y="480" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff" font-weight="600">Intro to AI</text>
      <text x="138" y="496" font-family="-apple-system, sans-serif" font-size="9" fill="#888">6 lessons · 1h 45m</text>
      <rect x="86" y="520" width="230" height="5" rx="2.5" fill="#333"/>
      <text x="86" y="540" font-family="-apple-system, sans-serif" font-size="8" fill="#888">Not started</text>
    </g>

    <!-- === Tab bar === -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.2s" fill="freeze"/>
      <rect x="60" y="590" width="280" height="60" fill="#1a1a1a"/>
      <line x1="60" y1="590" x2="340" y2="590" stroke="#333" stroke-width="0.5"/>

      <!-- Home (active) -->
      <rect x="80" y="598" width="8" height="8" rx="1" fill="#69c773"/>
      <rect x="77" y="608" width="14" height="2" rx="1" fill="#69c773"/>
      <text x="84" y="622" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#69c773">Home</text>

      <!-- Explore -->
      <circle cx="150" cy="602" r="5" fill="none" stroke="#666" stroke-width="1"/>
      <line x1="154" y1="606" x2="157" y2="609" stroke="#666" stroke-width="1"/>
      <text x="150" y="622" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#666">Explore</text>

      <!-- Practice -->
      <rect x="212" y="597" width="10" height="10" rx="2" fill="none" stroke="#666" stroke-width="1"/>
      <text x="217" y="622" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#666">Practice</text>

      <!-- Profile -->
      <circle cx="284" cy="602" r="5" fill="none" stroke="#666" stroke-width="1"/>
      <line x1="276" y1="610" x2="292" y2="610" stroke="#666" stroke-width="1"/>
      <text x="284" y="622" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#666">Profile</text>

      <!-- Home indicator -->
      <rect x="160" y="637" width="80" height="4" rx="2" fill="#555"/>
    </g>
  </g>
</svg>