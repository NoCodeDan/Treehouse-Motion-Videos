<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="wbTitleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <linearGradient id="wbChatBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4290"/>
      <stop offset="100%" stop-color="#804197"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4290"/>
      <stop offset="50%" stop-color="#804197"/>
      <stop offset="100%" stop-color="#d44c66"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#804197"/>
      <stop offset="100%" stop-color="#d44c66"/>
    </linearGradient>
    <clipPath id="wbClip">
      <rect x="10" y="10" width="880" height="540" rx="10"/>
    </clipPath>
    <clipPath id="previewClip">
      <rect x="350" y="46" width="540" height="504"/>
    </clipPath>
    <filter id="chatShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g clip-path="url(#wbClip)">
    <!-- Chrome window frame -->
    <rect x="10" y="10" width="880" height="540" rx="10" fill="#fff" stroke="#ccc" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="10" y="10" width="880" height="36" rx="10" fill="url(#wbTitleBar)"/>
    <!-- Flatten bottom corners of title bar -->
    <rect x="10" y="36" width="880" height="10" fill="url(#wbTitleBar)"/>
    <line x1="10" y1="46" x2="890" y2="46" stroke="#ccc" stroke-width="1"/>

    <!-- Traffic lights -->
    <circle cx="30" cy="28" r="6" fill="#ff5f57"/>
    <circle cx="48" cy="28" r="6" fill="#febc2e"/>
    <circle cx="66" cy="28" r="6" fill="#28c840"/>

    <!-- URL bar -->
    <rect x="160" y="17" width="500" height="22" rx="11" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
    <text x="186" y="32" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#888">
      <tspan fill="#28c840">&#x1F512; </tspan>buildai.app/project/my-website
    </text>
    <!-- Lock icon substitute -->
    <circle cx="174" cy="28" r="4" fill="none" stroke="#28c840" stroke-width="1.2"/>
    <rect x="171" y="28" width="6" height="4" rx="1" fill="none" stroke="#28c840" stroke-width="1.2"/>

    <!-- ============ LEFT PANEL: Chat ============ -->
    <rect x="10" y="46" width="340" height="504" fill="url(#wbChatBg)"/>

    <!-- Divider between panels -->
    <line x1="350" y1="46" x2="350" y2="550" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Chat header -->
    <rect x="10" y="46" width="340" height="40" fill="#fff"/>
    <line x1="10" y1="86" x2="350" y2="86" stroke="#eee" stroke-width="1"/>

    <!-- AI avatar -->
    <circle cx="36" cy="66" r="12" fill="url(#aiGradient)"/>
    <text x="36" y="70" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold">AI</text>

    <text x="56" y="63" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#222">AI Assistant</text>
    <text x="56" y="76" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="10" fill="#28c840">Online</text>

    <!-- === Chat Messages === -->

    <!-- User message 1 (appears first) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
      <rect x="130" y="100" width="210" height="42" rx="12" fill="#4a4290" filter="url(#chatShadow)"/>
      <text font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff">
        <tspan x="142" y="117">Build me a modern landing</tspan>
        <tspan x="142" y="132">page for a tech startup</tspan>
      </text>
    </g>

    <!-- AI response 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
      <rect x="20" y="152" width="240" height="56" rx="12" fill="#fff" stroke="#eee" stroke-width="1" filter="url(#chatShadow)"/>
      <text font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#444">
        <tspan x="32" y="170">I'll create a landing page with a</tspan>
        <tspan x="32" y="184">hero section, nav bar, and CTA.</tspan>
        <tspan x="32" y="198" fill="#804197" font-weight="500">Building now...</tspan>
      </text>
    </g>

    <!-- User message 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.0s" fill="freeze"/>
      <rect x="150" y="220" width="190" height="42" rx="12" fill="#4a4290" filter="url(#chatShadow)"/>
      <text font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff">
        <tspan x="162" y="237">Add a features section</tspan>
        <tspan x="162" y="252">with 3 cards below the hero</tspan>
      </text>
    </g>

    <!-- AI response 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.0s" fill="freeze"/>
      <rect x="20" y="274" width="260" height="56" rx="12" fill="#fff" stroke="#eee" stroke-width="1" filter="url(#chatShadow)"/>
      <text font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#444">
        <tspan x="32" y="292">Adding a 3-column features grid</tspan>
        <tspan x="32" y="306">with icons and descriptions.</tspan>
        <tspan x="32" y="320" fill="#804197" font-weight="500">Updating preview...</tspan>
      </text>
    </g>

    <!-- User message 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="7.5s" fill="freeze"/>
      <rect x="120" y="342" width="220" height="42" rx="12" fill="#4a4290" filter="url(#chatShadow)"/>
      <text font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#fff">
        <tspan x="132" y="359">Make the gradient purple</tspan>
        <tspan x="132" y="374">to pink like Treehouse</tspan>
      </text>
    </g>

    <!-- AI response 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="8.5s" fill="freeze"/>
      <rect x="20" y="396" width="240" height="42" rx="12" fill="#fff" stroke="#eee" stroke-width="1" filter="url(#chatShadow)"/>
      <text font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="11" fill="#444">
        <tspan x="32" y="414">Updated the hero gradient to</tspan>
        <tspan x="32" y="428" fill="#804197" font-weight="500">#4a4290 &#8594; #804197 &#8594; #d44c66</tspan>
      </text>
    </g>

    <!-- Chat input -->
    <rect x="20" y="500" width="320" height="36" rx="18" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="40" y="522" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="12" fill="#bbb">Describe what to build...</text>
    <!-- Send button -->
    <circle cx="322" cy="518" r="14" fill="url(#aiGradient)"/>
    <path d="M316,518 L326,518 M322,512 L322,524 M326,514 L322,512 L318,514" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" transform="rotate(-90,322,518)"/>


    <!-- ============ RIGHT PANEL: Preview ============ -->
    <g clip-path="url(#previewClip)">
      <rect x="350" y="46" width="540" height="504" fill="#fff"/>

      <!-- Preview toolbar -->
      <rect x="350" y="46" width="540" height="28" fill="#f8f8f8"/>
      <line x1="350" y1="74" x2="890" y2="74" stroke="#eee" stroke-width="1"/>
      <text x="620" y="64" text-anchor="middle" font-family="-apple-system, SF Pro, Helvetica, sans-serif" font-size="10" fill="#888">Preview</text>
      <!-- Device toggles -->
      <rect x="780" y="52" width="30" height="16" rx="3" fill="#eee" stroke="#ddd" stroke-width="0.5"/>
      <text x="795" y="63" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#888">&#x1F4BB;</text>
      <rect x="814" y="52" width="24" height="16" rx="3" fill="#eee" stroke="#ddd" stroke-width="0.5"/>
      <text x="826" y="63" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#888">&#x1F4F1;</text>

      <!-- === WEBSITE PREVIEW BEING BUILT === -->

      <!-- Phase 1: Nav bar (appears with AI response 1) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.8s" fill="freeze"/>
        <rect x="350" y="74" width="540" height="36" fill="#fff"/>
        <line x1="350" y1="110" x2="890" y2="110" stroke="#f0f0f0" stroke-width="1"/>
        <!-- Logo placeholder -->
        <rect x="370" y="82" width="60" height="8" rx="2" fill="#222"/>
        <rect x="370" y="94" width="30" height="5" rx="1" fill="#ddd"/>
        <!-- Nav links -->
        <rect x="700" y="86" width="30" height="5" rx="1" fill="#888"/>
        <rect x="740" y="86" width="36" height="5" rx="1" fill="#888"/>
        <rect x="786" y="86" width="28" height="5" rx="1" fill="#888"/>
        <rect x="826" y="82" width="50" height="14" rx="7" fill="#4a4290"/>
        <text x="851" y="92" text-anchor="middle" font-size="7" fill="#fff" font-family="-apple-system, sans-serif">Sign Up</text>
      </g>

      <!-- Phase 2: Hero section (builds out progressively) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.2s" fill="freeze"/>
        <rect x="350" y="110" width="540" height="170" fill="url(#heroGrad)"/>

        <!-- Hero text -->
        <rect x="440" y="140" width="280" height="16" rx="3" fill="#fff" opacity="0.95"/>
        <rect x="480" y="164" width="200" height="8" rx="2" fill="#fff" opacity="0.5"/>
        <rect x="500" y="178" width="160" height="8" rx="2" fill="#fff" opacity="0.5"/>

        <!-- CTA buttons -->
        <rect x="530" y="200" width="80" height="26" rx="13" fill="#fff"/>
        <text x="570" y="217" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#4a4290">Get Started</text>

        <rect x="620" y="200" width="80" height="26" rx="13" fill="none" stroke="#fff" stroke-width="1.5"/>
        <text x="660" y="217" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#fff">Learn More</text>
      </g>

      <!-- Phase 3: Loading shimmer effect while "building" -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" begin="2.8s" fill="freeze"/>
        <rect x="380" y="295" width="160" height="120" rx="6" fill="#f0f0f0"/>
        <rect x="550" y="295" width="160" height="120" rx="6" fill="#f0f0f0"/>
        <rect x="720" y="295" width="160" height="120" rx="6" fill="#f0f0f0"/>
      </g>

      <!-- Phase 4: Features cards (appear with message 2) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.6s" begin="5.5s" fill="freeze"/>

        <!-- Section title -->
        <rect x="540" y="290" width="140" height="10" rx="2" fill="#222"/>
        <rect x="520" y="306" width="180" height="6" rx="1" fill="#ccc"/>

        <!-- Card 1 -->
        <rect x="380" y="325" width="150" height="140" rx="8" fill="#fff" stroke="#eee" stroke-width="1"/>
        <circle cx="455" cy="355" r="18" fill="#f0e8ff"/>
        <text x="455" y="360" text-anchor="middle" font-size="14">&#x26A1;</text>
        <rect x="415" y="384" width="80" height="7" rx="2" fill="#222"/>
        <rect x="400" y="398" width="110" height="4" rx="1" fill="#bbb"/>
        <rect x="410" y="408" width="90" height="4" rx="1" fill="#bbb"/>
        <rect x="405" y="418" width="100" height="4" rx="1" fill="#bbb"/>
        <rect x="415" y="436" width="80" height="18" rx="9" fill="url(#btnGrad)"/>
        <text x="455" y="449" text-anchor="middle" font-size="7" fill="#fff" font-family="-apple-system, sans-serif">Learn More</text>

        <!-- Card 2 -->
        <rect x="545" y="325" width="150" height="140" rx="8" fill="#fff" stroke="#eee" stroke-width="1"/>
        <circle cx="620" cy="355" r="18" fill="#e8f0ff"/>
        <text x="620" y="360" text-anchor="middle" font-size="14">&#x1F680;</text>
        <rect x="580" y="384" width="80" height="7" rx="2" fill="#222"/>
        <rect x="565" y="398" width="110" height="4" rx="1" fill="#bbb"/>
        <rect x="575" y="408" width="90" height="4" rx="1" fill="#bbb"/>
        <rect x="570" y="418" width="100" height="4" rx="1" fill="#bbb"/>
        <rect x="580" y="436" width="80" height="18" rx="9" fill="url(#btnGrad)"/>
        <text x="620" y="449" text-anchor="middle" font-size="7" fill="#fff" font-family="-apple-system, sans-serif">Learn More</text>

        <!-- Card 3 -->
        <rect x="710" y="325" width="150" height="140" rx="8" fill="#fff" stroke="#eee" stroke-width="1"/>
        <circle cx="785" cy="355" r="18" fill="#fff0e8"/>
        <text x="785" y="360" text-anchor="middle" font-size="14">&#x1F512;</text>
        <rect x="745" y="384" width="80" height="7" rx="2" fill="#222"/>
        <rect x="730" y="398" width="110" height="4" rx="1" fill="#bbb"/>
        <rect x="740" y="408" width="90" height="4" rx="1" fill="#bbb"/>
        <rect x="735" y="418" width="100" height="4" rx="1" fill="#bbb"/>
        <rect x="745" y="436" width="80" height="18" rx="9" fill="url(#btnGrad)"/>
        <text x="785" y="449" text-anchor="middle" font-size="7" fill="#fff" font-family="-apple-system, sans-serif">Learn More</text>
      </g>

      <!-- Phase 5: Gradient color change effect (with message 3) -->
      <!-- Overlay that flashes to show the gradient update -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.3;0" dur="0.8s" begin="9.0s" fill="freeze"/>
        <rect x="350" y="110" width="540" height="170" fill="#d44c66"/>
      </g>

      <!-- Footer area (appears last) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="6.5s" fill="freeze"/>
        <rect x="350" y="480" width="540" height="70" fill="#1a1a2e"/>
        <rect x="400" y="498" width="80" height="5" rx="1" fill="#555"/>
        <rect x="520" y="498" width="60" height="5" rx="1" fill="#555"/>
        <rect x="620" y="498" width="70" height="5" rx="1" fill="#555"/>
        <rect x="730" y="498" width="50" height="5" rx="1" fill="#555"/>
        <rect x="400" y="520" width="200" height="4" rx="1" fill="#333"/>
      </g>
    </g>
  </g>
</svg>
